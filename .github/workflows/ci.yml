name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  celctl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: celctl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: celctl/go.mod
          cache-dependency-path: celctl/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test -v ./...
